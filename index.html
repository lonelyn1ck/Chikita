<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lonelyn1ck — Official</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --text: #ffffff;
            --text-muted: #a0a0a0;
            --border: #222222;
            --transition: all 0.3s ease;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            max-width: 1100px;
            margin: 0 auto;
            padding: 0 24px;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 50px 0;
        }

        .logo {
            background: var(--text);
            color: var(--bg);
            padding: 5px 15px;
            font-weight: 800;
            font-size: 1.2rem;
            text-decoration: none;
            text-transform: lowercase;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--text);
            font-size: 0.9rem;
            margin-left: 30px;
            font-weight: 400;
            opacity: 0.7;
            transition: var(--transition);
        }

        .nav-links a:hover { opacity: 1; }

        .hero {
            padding: 100px 0 150px;
            text-align: center;
        }

        .hero h1 {
            font-size: clamp(4rem, 15vw, 9rem);
            font-weight: 800;
            letter-spacing: -6px;
            line-height: 0.85;
            margin-bottom: 40px;
            text-transform: lowercase;
        }

        .hero p {
            font-size: 1.4rem;
            max-width: 600px;
            margin: 0 auto 50px;
            color: var(--text);
            font-weight: 400;
        }

        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
        }

        .btn {
            padding: 18px 45px;
            font-size: 1rem;
            font-weight: 600;
            text-decoration: none;
            transition: var(--transition);
        }

        .btn-primary {
            background: var(--text);
            color: var(--bg);
        }

        .btn-primary:hover {
            background: #e0e0e0;
            transform: translateY(-2px);
        }

        .btn-secondary {
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-secondary:hover {
            border-color: var(--text);
            background: rgba(255,255,255,0.05);
        }
